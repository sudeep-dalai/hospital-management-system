<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hospital Management System - Login</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-body">
  <div class="auth-wrapper">
    <div class="auth-left">
      <div class="brand-card">
        <h1>MediCare Plus</h1>
        <p>Advanced Hospital Management System</p>
        <div class="feature-list">
          <div class="feature-item">Patient Management</div>
          <div class="feature-item">Doctor Management</div>
          <div class="feature-item">Appointment Booking</div>
          <div class="feature-item">Live Dashboard</div>
        </div>
      </div>
    </div>

    <div class="auth-right">
      <div class="auth-box">
        <div class="tab-buttons">
          <button type="button" id="showLoginBtn" class="tab-btn active">Login</button>
          <button type="button" id="showRegisterBtn" class="tab-btn">Register</button>
        </div>

        <form id="loginForm" class="auth-form">
          <h2>Welcome Back</h2>
          <input type="email" id="loginEmail" placeholder="Enter Email" required />
          <input type="password" id="loginPassword" placeholder="Enter Password" required />
          <button type="submit" class="primary-btn">Login</button>
        </form>

        <form id="registerForm" class="auth-form hidden">
          <h2>Create Account</h2>
          <input type="text" id="registerFullName" placeholder="Full Name" required />
          <input type="email" id="registerEmail" placeholder="Email Address" required />
          <input type="password" id="registerPassword" placeholder="Create Password" required />
          <button type="submit" class="primary-btn">Register</button>
        </form>

        <p id="authMessage" class="message"></p>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
